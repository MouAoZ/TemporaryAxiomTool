name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
      - name: Check Python CLI
        run: python3 -m py_compile scripts/temporary_axiom_session.py scripts/session_tool/*.py
      - name: Session Roundtrip
        run: |
          lake build TemporaryAxiomTool TemporaryAxiomTool.TestFixture.Target
          python3 scripts/temporary_axiom_session.py prepare \
            --target TemporaryAxiomTool.TestFixture.Target.goal
          lake build TemporaryAxiomTool.TestFixture.Target
          python3 scripts/temporary_axiom_session.py cleanup
          lake build TemporaryAxiomTool.TestFixture.Target
